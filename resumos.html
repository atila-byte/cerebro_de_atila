<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumos Clínicos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilo da Barra de Pesquisa */
        .search-container { 
            background: #fff; 
            padding: 20px; 
            position: sticky; 
            top: 55px; 
            z-index: 90; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .search-box { 
            width: 100%; 
            padding: 15px 15px 15px 45px; 
            border: 2px solid #E0E0E0; 
            border-radius: 12px; 
            font-size: 1rem; 
            background: #FAFAFA url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%23999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>') no-repeat 15px center;
            transition: all 0.3s;
        }
        .search-box:focus { border-color: var(--primary); background-color: #fff; outline: none; }

        /* Grid de Doenças - 5 COLUNAS NO DESKTOP */
        .disease-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Cria exatamente 3 colunas iguais */
            gap: 30px; /* Aumentei o espaço entre os cartões */
            padding: 20px;
        }

        /* Responsividade para não quebrar no celular */
        @media (max-width: 1024px) {
            .disease-grid { grid-template-columns: repeat(3, 1fr); } /* 3 colunas em tablets */
        }
        @media (max-width: 600px) {
            .disease-grid { grid-template-columns: repeat(2, 1fr); } /* 2 colunas em celulares */
        }

        /* Estilo dos Cards - MAIORES E MAIS ESPAÇOSOS */
        .disease-card {
            background: white;
            padding: 30px 15px; /* Mais "recheio" para o cartão crescer */
            min-height: 160px; /* Altura mínima para garantir que fiquem grandes */
            border-radius: 12px;
            border-bottom: 6px solid #ccc; /* Borda um pouco mais grossa */
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); /* Sombra mais destacada */
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .disease-card:hover { 
            transform: translateY(-5px); /* Pula mais alto ao passar o mouse */
            box-shadow: 0 8px 20px rgba(0,0,0,0.12); 
        }
        
        .d-icon { 
            font-size: 3.5rem; /* Ícones bem maiores */
            margin-bottom: 12px; 
        } 
        .d-info { display: flex; flex-direction: column; align-items: center; }
        .d-title { 
            font-weight: 800; 
            font-size: 1.15rem; /* Fonte do título maior */
            margin-bottom: 6px; 
            line-height: 1.2; 
        }
        .d-desc { 
            font-size: 0.85rem; /* Fonte da descrição um pouco maior */
            color: #777; 
            line-height: 1.3; 
        }

        /* Cores Específicas */
        .border-red { border-bottom-color: #E53935; }
        .border-blue { border-bottom-color: #1E88E5; }
        .border-yellow { border-bottom-color: #FDD835; }
        .border-purple { border-bottom-color: #8E24AA; }
        .border-grey { border-bottom-color: #546E7A; }

        /* Mensagem "Não encontrado" */
        .no-results { text-align: center; color: #999; margin-top: 30px; display: none; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <header class="app-header">
        <button class="back-btn" onclick="window.location.href='index.html'">⬅</button>
        <div class="app-title">Resumos Clínicos 📚</div>
    </header>

    <div class="search-container">
        <input type="text" id="disease-search" class="search-box" placeholder="Pesquisar doença (ex: Asma, Diabetes)..." onkeyup="filterDiseases()">
    </div>

    <div class="container">
        <div id="disease-list" class="disease-grid">
            
            <a href="resumo_has.html" class="disease-card border-red" data-name="hipertensão arterial has pressão alta">
                <span class="d-icon">❤️</span>
                <div class="d-info">
                    <span class="d-title">Hipertensão</span>
                    <span class="d-desc">Diagnóstico e Metas</span>
                </div>
            </a>

            <a href="resumo_dm.html" class="disease-card border-blue" data-name="diabetes mellitus dm2 glicemia">
                <span class="d-icon">🩸</span>
                <div class="d-info">
                    <span class="d-title">Diabetes</span>
                    <span class="d-desc">Critérios e HbA1c</span>
                </div>
            </a>

            <a href="resumo_tb.html" class="disease-card border-yellow" data-name="tuberculose tb tosse sintomático respiratório">
                <span class="d-icon">🦠</span>
                <div class="d-info">
                    <span class="d-title">Tuberculose</span>
                    <span class="d-desc">Rastreio e RHZE</span>
                </div>
            </a>

            <a href="resumo_asma.html" class="disease-card border-purple" data-name="asma sibilância gina bronquite">
                <span class="d-icon">🌬️</span>
                <div class="d-info">
                    <span class="d-title">Asma</span>
                    <span class="d-desc">Etapas GINA</span>
                </div>
            </a>

            <a href="resumo_dpoc.html" class="disease-card border-grey" data-name="dpoc enfisema tabagismo gold">
                <span class="d-icon">🚬</span>
                <div class="d-info">
                    <span class="d-title">DPOC</span>
                    <span class="d-desc">Critérios GOLD</span>
                </div>
            </a>

        </div>
        
        <div id="no-results" class="no-results">
            Nenhuma doença encontrada.
        </div>
    </div>

    <script>
        function filterDiseases() {
            const input = document.getElementById('disease-search');
            const filter = input.value.toLowerCase();
            const list = document.getElementById('disease-list');
            const cards = list.getElementsByClassName('disease-card');
            let visibleCount = 0;

            for (let i = 0; i < cards.length; i++) {
                const keywords = cards[i].getAttribute('data-name');
                if (keywords.includes(filter)) {
                    cards[i].style.display = "flex";
                    visibleCount++;
                } else {
                    cards[i].style.display = "none";
                }
            }

            document.getElementById('no-results').style.display = visibleCount === 0 ? 'block' : 'none';
        }
    </script>
</body>
</html>
